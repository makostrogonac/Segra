name: Create Release

on:
  workflow_dispatch:
    inputs:
      rc_tag:
        description: 'The prerelease tag to use as a base (e.g., v0.1.0-rc.1 or v0.1.0-beta.1)'
        required: true
        type: string

jobs:
  build_and_release:
    runs-on: windows-2025-vs2026
    permissions:
      contents: write
    outputs:
      final_version_tag: ${{ steps.create_final_tag.outputs.final_version_tag }}
      final_version_number: ${{ steps.extract_final_version.outputs.final_version_number }}

    steps:
      - name: Get Prerelease Tag Input
        id: get_rc_tag_input
        shell: bash
        run: echo "rc_tag_name=${{ github.event.inputs.rc_tag }}" >> $GITHUB_OUTPUT

      - name: Validate Prerelease Tag Format
        id: validate_rc_tag
        shell: bash
        run: |
          rc_tag="${{ steps.get_rc_tag_input.outputs.rc_tag_name }}"
          if [[ ! "$rc_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-(rc|beta)\.[0-9]+$ ]]; then
            echo "::error::Invalid prerelease tag format: $rc_tag. Expected format: vX.Y.Z-rc.N or vX.Y.Z-beta.N"
            exit 1
          fi
          echo "Prerelease tag $rc_tag is valid."

      - name: Extract Final Version from Prerelease Tag
        id: extract_final_version
        shell: bash
        run: |
          rc_tag="${{ steps.get_rc_tag_input.outputs.rc_tag_name }}"
          final_version_tag=$(echo "$rc_tag" | sed -E 's/-(rc|beta)\.[0-9]+$//')
          final_version_number=$(echo "$final_version_tag" | sed 's/^v//')
          echo "final_version_tag=$final_version_tag" >> $GITHUB_OUTPUT
          echo "final_version_number=$final_version_number" >> $GITHUB_OUTPUT
          echo "Extracted final version tag: $final_version_tag"
          echo "Extracted final version number: $final_version_number"

      - name: Checkout Code at Prerelease Tag
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ steps.get_rc_tag_input.outputs.rc_tag_name }} # Checkout the specific prerelease tag
          submodules: recursive
          fetch-depth: 0 # Fetch all history for all tags and branches

      - name: Configure Git User
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
        shell: pwsh

      - name: Update Frontend package.json with Final Version
        id: update_frontend_version
        working-directory: ./Frontend
        shell: pwsh
        run: |
          $finalVersion = "${{ steps.extract_final_version.outputs.final_version_number }}"
          Write-Host "Updating Frontend package.json to version: $finalVersion"
          $packageJson = Get-Content package.json -Raw | ConvertFrom-Json
          $packageJson.version = $finalVersion
          $packageJson | ConvertTo-Json -Depth 100 | Set-Content package.json -NoNewline
          Write-Host "Updated Frontend version in package.json: $(Select-String -Path package.json -Pattern 'version')"

      - name: Build frontend; restore backend and install vpk in parallel
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          # vpk install and the NuGet restore don't depend on the frontend, so run them
          # in the background while the frontend builds; both are awaited before publish.
          $vpkJob = Start-Job {
            dotnet tool install -g vpk --version 1.2.0
            if ($LASTEXITCODE -ne 0) { throw "vpk install exited $LASTEXITCODE" }
          }
          $restoreJob = Start-Job -ArgumentList $PWD.Path {
            param($root)
            Set-Location $root
            dotnet restore -r win-x64
            if ($LASTEXITCODE -ne 0) { throw "dotnet restore exited $LASTEXITCODE" }
          }

          Push-Location Frontend
          npm ci
          if ($LASTEXITCODE -ne 0) { throw "npm ci exited $LASTEXITCODE" }
          npm run build
          if ($LASTEXITCODE -ne 0) { throw "npm run build exited $LASTEXITCODE" }
          Pop-Location

          # Copy the frontend build into Resources/wwwroot so dotnet publish embeds it.
          $destination = "./Resources/wwwroot"
          if (-Not (Test-Path -Path $destination)) { New-Item -ItemType Directory -Path $destination -Force | Out-Null }
          Remove-Item -Path "$destination\*" -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item -Path "./Frontend/dist/*" -Destination $destination -Recurse -Force

          # Native stderr from a job surfaces as error records, so relax ErrorAction and
          # merge it into output; gate success on each job's State (jobs throw on failure).
          $ErrorActionPreference = 'Continue'
          Write-Host "=== vpk tool install ==="
          Receive-Job $vpkJob -Wait 2>&1 | ForEach-Object { Write-Host $_ }
          Write-Host "=== dotnet restore -r win-x64 ==="
          Receive-Job $restoreJob -Wait 2>&1 | ForEach-Object { Write-Host $_ }
          if ($vpkJob.State -ne 'Completed') { throw "vpk install job failed (state: $($vpkJob.State))" }
          if ($restoreJob.State -ne 'Completed') { throw "dotnet restore job failed (state: $($restoreJob.State))" }

      - name: Publish the App
        run: dotnet publish -c Release -f net10.0-windows10.0.19041.0 --self-contained -r win-x64 -o publish --no-restore -p:Version=${{ steps.extract_final_version.outputs.final_version_number }}
        shell: pwsh

      - name: Upload Segra binaries for signing (Pass 1)
        id: upload_unsigned_exe
        uses: actions/upload-artifact@v7
        with:
          name: Segra-exe-unsigned
          path: |
            ./publish/Segra.exe
            ./publish/Segra.dll
          if-no-files-found: error
          retention-days: 1

      - name: Send Pushover notification (Pass 1)
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Invoke-RestMethod -Method POST -TimeoutSec 15 `
              -Uri "${{ secrets.PUSHOVER_API_URL }}/1/messages.json" `
              -Body @{
                token   = '${{ secrets.PUSHOVER_TOKEN }}'
                user    = '${{ secrets.PUSHOVER_USER }}'
                title   = 'Segra release'
                message = 'Packaging v${{ steps.extract_final_version.outputs.final_version_number }}'
              } | Out-Null
            Write-Host "Pushover notification sent"
          } catch {
            Write-Warning "Pushover notification failed: $_"
          }

      - name: Sign Segra.exe (Pass 1)
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Segra
          signing-policy-slug: release-signing
          artifact-configuration-slug: publish
          github-artifact-id: ${{ steps.upload_unsigned_exe.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./publish

      - name: Package with vpk for Final Release
        run: vpk pack -u Segra -v ${{ steps.extract_final_version.outputs.final_version_number }} -p ./publish -e Segra.exe -o ./output --packTitle "Segra" --noPortable -i ./Resources/icon.ico -s ./Resources/splash.png --splashProgressColor "#fecb00" --framework webview2
        shell: pwsh

      - name: Upload Velopack output for signing (Pass 2)
        id: upload_unsigned_output
        uses: actions/upload-artifact@v7
        with:
          name: Segra-output-unsigned
          path: ./output
          if-no-files-found: error
          retention-days: 1

      - name: Send Pushover notification (Pass 2)
        shell: pwsh
        continue-on-error: true
        run: |
          try {
            Invoke-RestMethod -Method POST -TimeoutSec 15 `
              -Uri "${{ secrets.PUSHOVER_API_URL }}/1/messages.json" `
              -Body @{
                token   = '${{ secrets.PUSHOVER_TOKEN }}'
                user    = '${{ secrets.PUSHOVER_USER }}'
                title   = 'Segra release'
                message = 'Finalizing v${{ steps.extract_final_version.outputs.final_version_number }} installer'
              } | Out-Null
            Write-Host "Pushover notification sent"
          } catch {
            Write-Warning "Pushover notification failed: $_"
          }

      - name: Sign installer + nupkg (Pass 2)
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: Segra
          signing-policy-slug: release-signing
          artifact-configuration-slug: output
          github-artifact-id: ${{ steps.upload_unsigned_output.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ./output

      - name: Regenerate Velopack manifests
        shell: pwsh
        run: |
          $nupkg = Get-ChildItem ./output/Segra-*-full.nupkg | Select-Object -First 1
          if (-not $nupkg) { throw "No nupkg found in ./output" }
          $size = $nupkg.Length
          $sha1 = (Get-FileHash $nupkg.FullName -Algorithm SHA1).Hash.ToUpperInvariant()
          $sha256 = (Get-FileHash $nupkg.FullName -Algorithm SHA256).Hash.ToUpperInvariant()
          Write-Host "Signed nupkg: $($nupkg.Name) size=$size sha1=$sha1"

          $releasesPath = './output/RELEASES'
          if (Test-Path $releasesPath) {
            $newLine = "$sha1 $($nupkg.Name) $size"
            [System.IO.File]::WriteAllText((Resolve-Path $releasesPath), $newLine, [System.Text.UTF8Encoding]::new($true))
            Write-Host "Rewrote RELEASES"
          }

          $winJsonPath = './output/releases.win.json'
          if (Test-Path $winJsonPath) {
            $winJson = Get-Content $winJsonPath -Raw | ConvertFrom-Json
            foreach ($asset in $winJson.Assets) {
              if ($asset.FileName -eq $nupkg.Name) {
                $asset.SHA1 = $sha1
                $asset.SHA256 = $sha256
                $asset.Size = $size
              }
            }
            $winJson | ConvertTo-Json -Depth 10 -Compress | Set-Content -Path $winJsonPath -NoNewline -Encoding utf8
            Write-Host "Rewrote releases.win.json"
          }

      - name: Create Final Git Tag
        id: create_final_tag
        shell: pwsh
        env:
          GH_PAT: ${{ secrets.PAT_TOKEN }}
        run: |
          $final_tag = "${{ steps.extract_final_version.outputs.final_version_tag }}"
          Write-Host "Creating final Git tag: $final_tag"
          
          # Override the default remote to use the PAT
          git remote set-url origin https://x-access-token:${env:GH_PAT}@github.com/${{ github.repository }}.git
          
          git tag $final_tag
          git push origin $final_tag
          
          echo "final_version_tag=$final_tag" >> $env:GITHUB_OUTPUT
          Write-Host "Final Git tag $final_tag created and pushed."

      - name: Upload Final Release Artifact (for release job)
        uses: actions/upload-artifact@v7
        with:
          name: Segra-Final-Build
          path: ./output
          retention-days: 1

  create_github_release:
    # Wait for both builds, but publish as long as the Windows build succeeded (the Linux job is
    # continue-on-error, so a Linux failure can't block the Windows release).
    needs: [build_and_release, build_linux]
    if: ${{ !cancelled() && needs.build_and_release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release
    steps:
      - name: Download Final Build Artifact (Windows)
        uses: actions/download-artifact@v8
        with:
          name: Segra-Final-Build

      - name: Download Linux Build Artifact
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          name: Segra-Linux
          path: linux

      - name: Create Final GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build_and_release.outputs.final_version_tag }}
          name: "Release ${{ needs.build_and_release.outputs.final_version_tag }}"
          prerelease: false
          generate_release_notes: false
          files: |
            ./Segra-win-Setup.exe
            ./RELEASES
            ./releases.win.json
            ./assets.win.json
            ./Segra-${{ needs.build_and_release.outputs.final_version_number }}-full.nupkg
            ./linux/*.AppImage
            ./linux/releases.linux.json
            ./linux/assets.linux.json
            ./linux/*linux*full.nupkg

  # Linux AppImage: builds in parallel with the Windows job (no dependency on it), Velopack-packs to the
  # "linux" channel, and uploads the result as an artifact that create_github_release publishes into the
  # same release. continue-on-error so a Linux failure never fails the run or blocks the Windows release.
  build_linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Compute final version from the prerelease tag
        id: ver
        run: |
          rc='${{ github.event.inputs.rc_tag }}'
          num=$(echo "$rc" | sed -E 's/-(rc|beta)\.[0-9]+$//' | sed 's/^v//')
          echo "num=$num" >> "$GITHUB_OUTPUT"

      - name: Checkout Code at Prerelease Tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.rc_tag }}
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend (versioned) and stage into Resources/wwwroot
        run: |
          (cd Frontend && npm ci && npm version "${{ steps.ver.outputs.num }}" --no-git-tag-version --allow-same-version && npm run build)
          mkdir -p Resources/wwwroot
          rm -rf Resources/wwwroot/*
          cp -r Frontend/dist/* Resources/wwwroot/

      - name: Publish (linux-x64)
        # TargetFrameworks=net10.0 restricts the restore to the Linux TFM so the Windows TFM's packages
        # (System.Management -> System.CodeDom, framework-provided on Windows but not on Linux) never
        # enter the graph and can't fail NU1102 on the Linux runner.
        run: dotnet publish Segra.csproj -c Release -f net10.0 -r linux-x64 --self-contained -o publish -p:TargetFrameworks=net10.0 -p:Version=${{ steps.ver.outputs.num }}

      - name: Stage a physical wwwroot
        # The AppImage runs from a read-only mount. The frontend is embedded, but ASP.NET (PhotinoServer)
        # creates its webroot at startup if missing, which throws on the read-only mount. Shipping the dir
        # (with the frontend) means it already exists, so nothing is created at runtime.
        run: mkdir -p publish/wwwroot && cp -r Frontend/dist/* publish/wwwroot/

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk --version 1.2.0

      - name: Package AppImage (linux channel)
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          chmod +x publish/Segra || true
          vpk pack -u Segra -v ${{ steps.ver.outputs.num }} \
            -p publish -e Segra -o output-linux --packTitle "Segra" \
            -i icon.png --channel linux
          echo "=== Velopack Linux output (verify asset names on first run) ==="
          ls -la output-linux

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v7
        with:
          name: Segra-Linux
          path: ./output-linux
          if-no-files-found: error
          retention-days: 1

  # Separate, non-blocking job so the release job goes green without waiting on VirusTotal.
  virustotal:
    needs: create_github_release
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Download Final Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: Segra-Final-Build

      - name: Upload installer to VirusTotal
        shell: bash
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          set -euo pipefail
          FILE="./Segra-win-Setup.exe"
          if [ -z "${VT_API_KEY:-}" ]; then
            echo "::warning::VIRUSTOTAL_API_KEY secret not set; skipping VirusTotal upload"
            exit 0
          fi
          if [ ! -f "$FILE" ]; then
            echo "::warning::$FILE not found; skipping VirusTotal upload"
            exit 0
          fi
          # /files caps at 32MB, so request a one-time large-file upload URL instead.
          echo "Requesting VirusTotal upload URL..."
          UPLOAD_URL=$(curl -sS --fail -H "x-apikey: $VT_API_KEY" \
            https://www.virustotal.com/api/v3/files/upload_url | jq -r '.data')
          echo "Uploading $FILE to VirusTotal..."
          ANALYSIS_ID=$(curl -sS --fail -H "x-apikey: $VT_API_KEY" \
            -F "file=@${FILE}" "$UPLOAD_URL" | jq -r '.data.id')
          REPORT_URL="https://www.virustotal.com/gui/file-analysis/$ANALYSIS_ID"
          echo "VirusTotal analysis id: $ANALYSIS_ID"
          echo "Report: $REPORT_URL"
          {
            echo "## VirusTotal"
            echo "Release installer submitted for scanning."
            echo ""
            echo "[View analysis]($REPORT_URL)"
          } >> "$GITHUB_STEP_SUMMARY"
