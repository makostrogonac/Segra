name: Publish APT Repo

# Builds the Segra .deb and publishes a signed apt repository to GitHub Pages so installed clients
# auto-update via `apt`. Runs on every published GitHub release: prereleases go to the 'beta' suite,
# real releases to 'stable'.
#
# Prerequisites (one-time):
#   1. Generate a GPG signing key; commit its PUBLIC key to packaging/linux/segra-archive-keyring.gpg
#      (dearmored) so the .deb ships it, and add its PRIVATE key (ASCII-armored) as the repo secret
#      APT_GPG_PRIVATE_KEY (+ APT_GPG_PASSPHRASE if the key has one).
#   2. Settings -> Pages -> deploy from branch: gh-pages / root.
# The published repo is served at https://segergren.github.io/Segra ; clients use:
#   deb [signed-by=/usr/share/keyrings/segra-archive-keyring.gpg] https://segergren.github.io/Segra stable main
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch or tag to build the .deb from'
        required: true
        default: 'feat/linux'
        type: string
      version:
        description: 'Version for the .deb (e.g. 1.7.0 or 1.7.0~beta.4)'
        required: true
        type: string
      channel:
        description: 'apt suite to publish to'
        required: true
        default: 'beta'
        type: choice
        options: [beta, stable]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push to gh-pages
    steps:
      - name: Resolve version + ref + suite
        id: v
        run: |
          # Prereleases go to the 'beta' suite, real releases to 'stable'; the .deb version uses '~' for
          # pre-release parts so apt orders 1.7.0~beta.4 < 1.7.0.
          # semver (dash) form drives npm/dotnet; deb (tilde) form drives the .deb name + apt ordering.
          # npm and MSBuild reject '~', so the two forms must not be conflated.
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            TAG='${{ github.event.release.tag_name }}'
            SEMVER="${TAG#v}"                                     # 1.7.0-beta.4 (semver, for npm/dotnet)
            NUM="${SEMVER/-beta./~beta.}"; NUM="${NUM/-rc./~rc.}" # 1.7.0~beta.4 (deb; apt orders it < 1.7.0)
            echo "num=${NUM}" >> "$GITHUB_OUTPUT"
            echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
            echo "ref=${TAG}" >> "$GITHUB_OUTPUT"
            [ "${{ github.event.release.prerelease }}" = "true" ] && echo "suite=beta" >> "$GITHUB_OUTPUT" || echo "suite=stable" >> "$GITHUB_OUTPUT"
          else
            NUM='${{ github.event.inputs.version }}'              # may be supplied in either form
            SEMVER="${NUM/~beta./-beta.}"; SEMVER="${SEMVER/~rc./-rc.}"
            echo "num=${NUM}" >> "$GITHUB_OUTPUT"
            echo "semver=${SEMVER}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ github.event.inputs.ref }}" >> "$GITHUB_OUTPUT"
            echo "suite=${{ github.event.inputs.channel }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout at the target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.v.outputs.ref }}
          submodules: recursive

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend (versioned) + stage wwwroot
        run: |
          (cd Frontend && npm ci && npm version "${{ steps.v.outputs.semver }}" --no-git-tag-version --allow-same-version && npm run build)
          mkdir -p Resources/wwwroot && rm -rf Resources/wwwroot/* && cp -r Frontend/dist/* Resources/wwwroot/

      - name: Publish (linux-x64)
        run: |
          dotnet publish Segra.csproj -c Release -f net10.0 -r linux-x64 --self-contained -o publish -p:TargetFrameworks=net10.0 -p:Version=${{ steps.v.outputs.semver }}
          mkdir -p publish/wwwroot && cp -r Frontend/dist/* publish/wwwroot/

      - name: Build the .deb
        run: SEGRA_VERSION=${{ steps.v.outputs.num }} SEGRA_APT_SUITE=${{ steps.v.outputs.suite }} bash build-deb.sh publish

      - name: Import GPG signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long

      - name: Check out existing repo (to accumulate the pool)
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: repo
        continue-on-error: true

      - name: Assemble + sign the apt repo
        env:
          APT_GPG_PASSPHRASE: ${{ secrets.APT_GPG_PASSPHRASE }}
        run: |
          set -e
          SUITE='${{ steps.v.outputs.suite }}'
          # Each suite (stable/beta) has its own pool so a beta build never lands in the stable index.
          mkdir -p "repo/pool/$SUITE/s/segra" "repo/dists/$SUITE/main/binary-amd64"
          cp output/segra_${{ steps.v.outputs.num }}_amd64.deb "repo/pool/$SUITE/s/segra/"
          # Keep only the newest few .debs per suite.
          ls -1t "repo/pool/$SUITE/s/segra"/*.deb | tail -n +6 | xargs -r rm -f

          cd repo
          apt-ftparchive packages "pool/$SUITE" > "dists/$SUITE/main/binary-amd64/Packages"
          gzip -9c "dists/$SUITE/main/binary-amd64/Packages" > "dists/$SUITE/main/binary-amd64/Packages.gz"
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=Segra \
            -o APT::FTPArchive::Release::Label=Segra \
            -o "APT::FTPArchive::Release::Suite=$SUITE" \
            -o "APT::FTPArchive::Release::Codename=$SUITE" \
            -o APT::FTPArchive::Release::Components=main \
            -o APT::FTPArchive::Release::Architectures=amd64 \
            release "dists/$SUITE" > "dists/$SUITE/Release"

          PASS=(); [ -n "$APT_GPG_PASSPHRASE" ] && PASS=(--pinentry-mode loopback --passphrase "$APT_GPG_PASSPHRASE")
          gpg "${PASS[@]}" --batch --yes -abs -o "dists/$SUITE/Release.gpg" "dists/$SUITE/Release"
          gpg "${PASS[@]}" --batch --yes --clearsign -o "dists/$SUITE/InRelease" "dists/$SUITE/Release"
          # Prevent Jekyll from hiding the dot-prefixed apt files.
          touch .nojekyll
          # Drop the nested checkout's .git so the Pages action publishes plain files.
          rm -rf .git

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./repo
          publish_branch: gh-pages

      - name: Attach .deb to the release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: output/segra_${{ steps.v.outputs.num }}_amd64.deb
